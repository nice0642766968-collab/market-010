<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU Digital Market | ตลาดนัดจันทรเกษม</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="authContainer" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <h2>🌙 CRU <span>Market</span></h2>
                <p id="authStatusText">เข้าสู่ระบบเพื่อเริ่มใช้งาน</p>
            </div>
            <div class="auth-body">
                <input type="email" id="email" placeholder="อีเมลนักศึกษา (@chandra.ac.th)">
                <input type="password" id="password" placeholder="รหัสผ่าน">
                <button onclick="handleAuth()" id="btnAuthMain" class="btn-primary">ตกลง</button>
                <p class="auth-toggle">
                    <span id="toggleMsg">ยังไม่มีบัญชี?</span> 
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="btnToggle">สมัครสมาชิก</a>
                </p>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-wrapper" style="display: none;">
        <nav class="navbar">
            <div class="nav-content">
                <div class="logo">CRU <span>Market</span></div>
                <div class="nav-right">
                    <button class="btn-add" onclick="openModal()">+ ลงประกาศ / ตั้งตี้หาร</button>
                    <button onclick="handleLogout()" class="btn-logout">ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar">
                <h3>คณะ / สาขาวิชา</h3>
                <ul id="categoryFilter">
                    <li class="active" onclick="filterBy('all')">ทั้งหมด</li>
                    <li onclick="filterBy('วิทยาศาสตร์')">วิทยาศาสตร์</li>
                    <li onclick="filterBy('วิทยาการจัดการ')">วิทยาการจัดการ</li>
                    <li onclick="filterBy('มนุษยศาสตร์')">มนุษยศาสตร์</li>
                    <li onclick="filterBy('ศึกษาศาสตร์')">ศึกษาศาสตร์</li>
                    <li onclick="filterBy('ทั่วไป')">ทั่วไป</li>
                </ul>
            </aside>

            <main class="feed">
                <div id="productGrid" class="grid">
                    </div>
            </main>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>📢 สร้างประกาศใหม่</h3>
            <input type="text" id="pTitle" placeholder="ชื่อสินค้าหรือรายการหาร">
            <select id="pCat">
                <option value="ทั่วไป">เลือกหมวดหมู่คณะ</option>
                <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
                <option value="วิทยาการจัดการ">วิทยาการจัดการ</option>
                <option value="มนุษยศาสตร์">มนุษยศาสตร์</option>
                <option value="ศึกษาศาสตร์">ศึกษาศาสตร์</option>
            </select>
            
            <div class="calc-box">
                <label>ระบบคำนวณราคา (สำหรับหารค่าใช้จ่าย)</label>
                <div class="row">
                    <input type="number" id="pTotal" placeholder="ราคารวม (บาท)" oninput="updateSplit()">
                    <input type="number" id="pCount" placeholder="จำนวนคนหาร" value="1" oninput="updateSplit()">
                </div>
                <div id="splitResult" class="split-info">ยอดต่อคน: ฿0.00</div>
            </div>

            <textarea id="pDesc" placeholder="รายละเอียดเพิ่มเติม (เช่น สภาพสินค้า, จุดนัดรับ)"></textarea>
            <div class="modal-btns">
                <button onclick="closeModal()" class="btn-secondary">ยกเลิก</button>
                <button onclick="savePost()" class="btn-primary">ยืนยันการโพสต์</button>
            </div>
        </div>
    </div>

    <div id="chatBox" class="chat-popup" style="display: none;">
        <div class="chat-header">
            <span id="chatTitle">ห้องแชท</span>
            <button onclick="closeChat()">×</button>
        </div>
        <div id="chatMessages" class="chat-body"></div>
        <div class="chat-input-area">
            <input type="text" id="msgInput" placeholder="พิมพ์ข้อความ...">
            <button onclick="sendMsg()">ส่ง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
